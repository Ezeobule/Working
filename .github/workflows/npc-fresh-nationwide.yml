name: NPC Fresh Nationwide Extraction

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  extract:
    if: contains(github.event.issue.title, '[NPC-FRESH]')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Post run identifier
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh api repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments -f body="RUN_ID=${GITHUB_RUN_ID}"
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run fresh nationwide extraction
        run: python scripts/npc_fresh_nationwide.py
      - name: Upload fresh output
        uses: actions/upload-artifact@v4
        with:
          name: npc-fresh-nationwide-output
          path: |
            npc_fresh_output/unique_contacts.csv
            npc_fresh_output/new_unique_contacts_excluding_baseline.csv
            npc_fresh_output/status.json
            npc_fresh_output/state_directory_summary.csv
          retention-days: 2
