name: NPC Fresh Nationwide Extraction

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  extract:
    if: contains(github.event.issue.title, '[NPC-FRESH]')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run fresh nationwide extraction
        run: python scripts/npc_fresh_nationwide.py
      - name: Commit fresh output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add npc_fresh_output/
          git commit -m "Fresh nationwide NPC extraction output" || exit 0
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git pull --rebase origin main || true
          git push origin HEAD:main
