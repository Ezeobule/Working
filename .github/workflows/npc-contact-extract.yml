name: Data Refresh
on:
  issues:
    types: [opened]
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python scripts/npc_contact_extract.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh generated contact data
          file_pattern: npc_output/*
