name: NPC Contact Extract
on:
  push:
    paths:
      - 'scripts/npc_contact_extract.py'
      - '.github/workflows/npc-contact-extract.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python scripts/npc_contact_extract.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add NPC public contact extraction output
          file_pattern: npc_output/*
