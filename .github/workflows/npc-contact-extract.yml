name: Full NPC Contact Refresh
on:
  issues:
    types: [opened]
permissions:
  contents: read
  issues: write
  actions: read
jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - name: Extract all available unique contacts
        run: python scripts/npc_contact_extract_all.py
      - name: Upload extraction files
        uses: actions/upload-artifact@v4
        with:
          name: npc-full-contact-output
          path: |
            npc_output/unique_contacts.csv
            npc_output/status.json
            npc_output/state_directory_summary.csv
          retention-days: 2
      - name: Post run identifier
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh api repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments -f body="RUN_ID=${GITHUB_RUN_ID}"
