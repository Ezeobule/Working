name: Data Refresh
on:
  issues:
    types: [opened]
permissions:
  contents: read
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python scripts/npc_contact_extract.py
      - uses: actions/upload-artifact@v4
        with:
          name: data-output
          path: npc_output/
