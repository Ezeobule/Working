name: Data Refresh
on:
  issues:
    types: [opened]
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4

      - run: python scripts/npc_contact_extract.py

      # Ensure local branch is up-to-date before pushing to avoid non-fast-forward errors
      - name: Fetch and rebase on origin/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Use the GITHUB_TOKEN for authenticated fetch/push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin main
          # Attempt to rebase onto origin/main; if it fails, try pull --rebase as fallback
          git rebase origin/main || git pull --rebase origin main || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh generated contact data
          file_pattern: npc_output/*
          branch: main
